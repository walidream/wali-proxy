<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f5f5f5;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 11px;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4CAF50;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .btn {
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary {
      background: #1976D2;
      color: #fff;
    }
    .btn-primary:hover { background: #1565C0; }
    .btn-danger {
      background: none;
      color: #e53935;
      padding: 4px 6px;
      font-size: 18px;
      line-height: 1;
    }
    .btn-danger:hover { background: #ffebee; border-radius: 4px; }
    .rules {
      padding: 8px;
      max-height: 450px;
      overflow-y: auto;
    }
    .rule {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .rule-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .rule-header label {
      font-weight: 500;
      font-size: 12px;
      color: #666;
    }
    .rule-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rule input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
    }
    .rule input[type="text"]:focus {
      outline: none;
      border-color: #1976D2;
    }
    .rule textarea {
      width: 100%;
      min-height: 80px;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
      resize: vertical;
    }
    .rule textarea:focus {
      outline: none;
      border-color: #1976D2;
    }
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: #999;
    }
    .rule textarea.invalid {
      border-color: #e53935;
      background: #fff5f5;
    }
    .json-error {
      color: #e53935;
      font-size: 11px;
      margin-top: 4px;
      display: none;
    }
    .btn-refresh {
      background: #fff;
      border: 1px solid #ddd;
      color: #666;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-refresh:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Fetch Interceptor</h1>
    <div class="header-actions">
      <label class="toggle" title="Global switch">
        <input type="checkbox" id="globalToggle" checked>
        <span class="slider"></span>
      </label>
      <button class="btn btn-refresh" id="refreshTab" title="Refresh current tab">Refresh</button>
      <button class="btn btn-primary" id="addRule">+ Add Rule</button>
    </div>
  </div>
  <div class="rules" id="rulesContainer">
    <div class="empty" id="emptyState">No rules yet. Click "+ Add Rule" to start.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
